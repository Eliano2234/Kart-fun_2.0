<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIMBERTOUT - VIRTUAL COCKPIT FUN</title>
    <style>
        :root {
            --bg-dark: #020204;
            --neon-red: #ff003c;
            --neon-green: #00ff66;
            --neon-blue: #00d2ff;
            --neon-orange: #ffaa00;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        body { 
            background: radial-gradient(circle at center, #0a0a16 0%, var(--bg-dark) 100%); 
            color: var(--text-main); 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* CITATION D'OUVERTURE */
        #ios-lockout {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: #000; z-index: 99999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px; text-align: center;
        }
        .citation { font-family: 'Georgia', serif; font-style: italic; font-size: 1.6rem; color: #e0e0e0; max-width: 80%; line-height: 1.4; margin-bottom: 10px; }
        .auteur { font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        #ios-lockout button {
            background: transparent; color: white; font-weight: bold; padding: 12px 35px;
            border: 1px solid white; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s;
        }
        #ios-lockout button:active { background: #fff; color: #000; }

        /* ÉCRAN PRINCIPAL : EFFET COCKPIT UNIQUE ÉPURÉ */
        .cockpit-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* COMPTEUR CENTRAL */
        .gauge-cluster {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Cercle SVG pour l'aiguille RPM */
        .gauge-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg); /* Démarrage de l'aiguille en haut ou ajusté */
        }
        .gauge-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.04);
            stroke-width: 6;
        }
        .gauge-needle {
            fill: none;
            stroke: var(--neon-blue);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 754; /* 2 * PI * r (r=120) */
            stroke-dashoffset: 754;
            transition: stroke-dashoffset 0.1s ease-out, stroke 0.3s;
        }

        /* Infos numériques au centre du cercle */
        .gauge-digital {
            text-align: center;
            z-index: 10;
            margin-top: -10px;
        }
        .speed-value {
            font-size: 5.5rem;
            font-weight: 800;
            font-family: monospace;
            line-height: 1;
            letter-spacing: -2px;
        }
        .speed-unit {
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            display: block;
            margin-top: -5px;
            margin-bottom: 5px;
        }
        .rpm-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--neon-blue);
            font-family: monospace;
        }

        /* COMPTEUR ALCOOLEMIE ET ACCESSOIRES DISCRETS SUR LES CÔTÉS */
        .side-info {
            position: absolute;
            bottom: 25px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #444;
            text-align: center;
        }
        .side-left { left: 40px; text-align: left; }
        .side-right { right: 40px; text-align: right; }
        .amber-text { color: var(--neon-orange); font-weight: bold; }

        /* BANNIÈRES DE VOYANTS DYNAMIQUES (POP-UP S'ALLUMANT SUR TOUT L'ÉCRAN) */
        .alert-popup {
            position: absolute;
            top: -100px; /* Caché au début */
            left: 50%;
            transform: translateX(-50%);
            width: 380px;
            background: rgba(10, 5, 5, 0.92);
            border: 1px solid rgba(255, 0, 60, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
            z-index: 9999;
        }
        .alert-popup.active {
            top: 20px; /* Descend à l'écran */
        }
        
        /* Gros icone du voyant */
        .alert-icon {
            font-size: 2.2rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
        }
        
        .alert-content {
            flex-grow: 1;
        }
        .alert-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #666;
            letter-spacing: 0.5px;
        }
        .alert-msg {
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            margin-top: 2px;
        }
        
        .alert-close {
            font-size: 1.1rem;
            color: #444;
            cursor: pointer;
            padding: 5px;
            font-weight: bold;
        }
        .alert-close:active { color: #fff; }

        /* Couleurs thématiques des alertes */
        .alert-popup.danger { border-color: rgba(255, 0, 60, 0.4); box-shadow: 0 10px 25px rgba(255, 0, 60, 0.15); }
        .alert-popup.danger .alert-icon { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
        
        .alert-popup.warning { border-color: rgba(255, 170, 0, 0.4); box-shadow: 0 10px 25px rgba(255, 170, 0, 0.15); }
        .alert-popup.warning .alert-icon { color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange); }

        /* CONFIG HIDDEN BAR IN BOTTOM */
        .config-bar { position: fixed; bottom: 0; width: 100vw; height: 15px; opacity: 0; display: flex; justify-content: center; gap: 10px; }
        .config-bar input { width: 30px; }

        #portrait-warning { display: none; position: fixed; top:0; left:0; width:100vw; height:100vh; background: #000; z-index: 999999; justify-content: center; align-items: center; }
        @media (orientation: portrait) { #portrait-warning { display: flex; } }
    </style>
</head>
<body>

    <div id="portrait-warning"><h3>🔄 METS L'HORIZON AU PAS, PILOTE !</h3></div>

    <!-- CITATION FIXÉE PAR L.F.ILLIOL -->
    <div id="ios-lockout">
        <div class="citation">"Le problème de notre drapeau, c'est que le blanc est au milieu."</div>
        <div class="auteur">L.F.illiol</div>
        <button onclick="activerLeBordel()">METTRE LE CONTACT</button>
    </div>

    <!-- BANNIÈRE DE VOYANT POP-UP (STYLE ENREGISTREMENT SYSTEME) -->
    <div class="alert-popup danger" id="popup-alerte">
        <div class="alert-icon" id="pop-icon">⚙️</div>
        <div class="alert-content">
            <div class="alert-title" id="pop-type">ALERTE SYSTÈME</div>
            <div class="alert-msg" id="pop-text">Maintenance Courroie d'éjaculation requise.</div>
        </div>
        <div class="alert-close" onclick="dismissAlerte()">✕</div>
    </div>

    <!-- LE COCKPIT NUMÉRIQUE -->
    <div class="cockpit-container">
        
        <!-- COMPTEUR CENTRAL STYLE VOITURE MODERNE -->
        <div class="gauge-cluster">
            <svg class="gauge-svg" viewBox="0 0 260 260">
                <!-- Piste de fond grise transparente -->
                <circle class="gauge-track" cx="130" cy="130" r="120"></circle>
                <!-- Aiguille circulaire de couleur -->
                <circle class="gauge-needle" id="needle-rpm" cx="130" cy="130" r="120"></circle>
            </svg>
            
            <div class="gauge-digital">
                <div class="speed-value" id="fun-speed">0</div>
                <span class="speed-unit">km/h</span>
                <div class="rpm-value"><span id="fun-rpm">0</span> <span style="font-size:0.65rem; color:#444;">RPM</span></div>
            </div>
        </div>

        <!-- INFOS ANNEXES TRÈS DISCRÈTES AUX QUATRE COINS POUR ÉPURER -->
        <div class="side-info side-left">
            <span style="color:#333;">PILOTE STATUS :</span> <span id="pilote-status" style="color:#666;">ALERTE FINIE</span><br>
            <span style="color:#333;">GÉOLOC :</span> <span id="geoloc-status" style="color:#666;">SUR LA PISTE</span>
        </div>

        <div class="side-info side-right">
            <span style="color:#333;">ALCOOMÉTRIE :</span> <span id="fun-alcool" class="amber-text">0.00 g/L</span><br>
            <span id="fun-alcool-msg" style="font-size:0.6rem; color:#444;">ÉVALUATION EN COURS</span>
        </div>

    </div>

    <!-- CONFIGURATION TECHNIQUE DISCRÈTE (Pour le calcul RPM exact arrière-plan) -->
    <div class="config-bar">
        <input type="number" id="cfg-p" value="11">
        <input type="number" id="cfg-c" value="80">
        <input type="number" id="cfg-d" value="27.5">
    </div>

    <script>
        let setup = {
            p: parseInt(localStorage.getItem('k_pignon')) || 11,
            c: parseInt(localStorage.getItem('k_couronne')) || 80,
            d: parseFloat(localStorage.getItem('k_pneu')) || 27.5
        };

        let currentRunTimeout = null;
        const maxDisplayRpm = 14000; // Seuil max théorique du kart pour l'aiguille

        // Liste des conneries de voyants avec leurs logos et types
        const banquesAlertes = [
            { icon: "⚙️", type: "DANGER CRITIQUE", msg: "Maintenance Courroie d'éjaculation !", style: "danger" },
            { icon: "🍺", type: "ALERTE CARBURATION", msg: "Mélange détecté : 80% Pastis / 20% Friture", style: "warning" },
            { icon: "🚨", type: "SÉCURITÉ PILOTE", msg: "Alerte : Système nerveux du pilote défaillant", style: "danger" },
            { icon: "🪨", type: "INFO GPS", msg: "Alerte trajectoire : En plein dans le bac à gravier", style: "warning" },
            { icon: "🚭", type: "CABINE SÉCURITÉ", msg: "Interdiction de fumer le soufflet ouvert ! (Amende 135€)", style: "danger" },
            { icon: "🥴", type: "ANALYSE BIOMÉTRIQUE", msg: "Taux de connerie dans le sang supérieur à la limite légale", style: "warning" }
        ];

        function activerLeBordel() {
            document.getElementById('ios-lockout').style.display = 'none';
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});

            startMoteurFou();
            startHardwareGps();
        }

        function startHardwareGps() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    let speedKMH = pos.coords.speed ? (pos.coords.speed * 3.6) : 0;
                    let speedMS = pos.coords.speed || 0;

                    // Calcul RPM exact identique aux versions précédentes
                    let circ = (setup.d / 100) * Math.PI;
                    let rpm = Math.round(((speedMS * 60) / circ) * (setup.c / setup.p));
                    if (rpm < 0 || isNaN(rpm)) rpm = 0;

                    // Affichage numérique central
                    document.getElementById('fun-speed').innerText = Math.round(speedKMH);
                    document.getElementById('fun-rpm').innerText = rpm;

                    // --- LOGIQUE DE L'AIGUILLE CIRCULAIRE ---
                    let needle = document.getElementById('needle-rpm');
                    let circumference = 2 * Math.PI * 120; // 754
                    
                    // Calculer le pourcentage de remplissage du cercle selon les RPM
                    let pct = Math.min(rpm / maxDisplayRpm, 1);
                    let offset = circumference - (pct * circumference);
                    
                    needle.style.strokeDashoffset = offset;

                    // Si on est proche de la rupture, l'aiguille passe au rouge vif
                    if (pct > 0.82) {
                        needle.style.stroke = "var(--neon-red)";
                    } else if (pct > 0.6) {
                        needle.style.stroke = "var(--neon-orange)";
                    } else {
                        needle.style.stroke = "var(--neon-blue)";
                    }

                }, () => {}, { enableHighAccuracy: true });
            }
        }

        function startMoteurFou() {
            // Déclencheur intempestif des pop-ups de voyants (Toutes les 22 secondes)
            setInterval(() => {
                triggerAlerteAleatoire();
            }, 22000);

            // Moteur de génération de taux d'alcoolémie aberrant
            const blaguesAlcool = ["Coma Éthylique Imminent", "Chauffeur de Moissonneuse", "Éligible au permis poney", "Contrôle technique refusé", "Pur malt détecté"];
            setInterval(() => {
                let fauxTaux = (1.8 + Math.random() * 6.5).toFixed(2);
                document.getElementById('fun-alcool').innerText = `${fauxTaux} g/L`;
                document.getElementById('fun-alcool-msg').innerText = blaguesAlcool[Math.floor(Math.random() * blaguesAlcool.length)];
            }, 5000);
            
            // Premier déclenchement rapide après l'ouverture pour tester
            setTimeout(() => { triggerAlerteAleatoire(); }, 3000);
        }

        function triggerAlerteAleatoire() {
            // Choisir une fausse panne au hasard
            let alerte = banquesAlertes[Math.floor(Math.random() * banquesAlertes.length)];
            
            let popup = document.getElementById('popup-alerte');
            document.getElementById('pop-icon').innerText = alerte.icon;
            document.getElementById('pop-type').innerText = alerte.type;
            document.getElementById('pop-text').innerText = alerte.msg;

            // Ajuster le style css (danger ou warning)
            popup.className = `alert-popup ${alerte.style}`;
            
            // Faire descendre la bannière à l'écran
            popup.classList.add('active');

            // Mettre à jour les statuts secondaires selon l'alerte
            if (alerte.icon === "🚨") document.getElementById('pilote-status').innerHTML = "<span style='color:red;'>DÉFAILLANT</span>";
            if (alerte.icon === "🪨") document.getElementById('geoloc-status').innerHTML = "<span style='color:var(--neon-orange);'>DANS LES CAILLOUX</span>";

            // Nettoyer l'ancien timer s'il y en avait un actif
            if(currentRunTimeout) clearTimeout(currentRunTimeout);

            // Disparition automatique au bout de 20 secondes si on n'a pas cliqué sur la croix
            currentRunTimeout = setTimeout(() => {
                dismissAlerte();
            }, 20000);
        }

        function dismissAlerte() {
            let popup = document.getElementById('popup-alerte');
            popup.classList.remove('active'); // Remonte cacher la bannière
            
            // Remise à zéro des statuts secondaires discrets
            setTimeout(() => {
                document.getElementById('pilote-status').innerHTML = "<span style='color:#666;'>RAS</span>";
                document.getElementById('geoloc-status').innerHTML = "<span style='color:#666;'>SUR LA PISTE</span>";
            }, 500);
        }
    </script>
</body>
</html>
